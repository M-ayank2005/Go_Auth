# fly.toml – fly.io app configuration
# See https://fly.io/docs/reference/configuration/ for details.

app = "go-auth"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Environment variables that are safe to commit.
# Secrets (DATABASE_URL, JWT_SECRET) must be set with:
#   fly secrets set DATABASE_URL="..." JWT_SECRET="..."
[env]
  PORT = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval     = "30s"
    timeout      = "10s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size = "shared-cpu-1x"
